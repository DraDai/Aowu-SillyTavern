name: Deploy to cloud server

on:
  push:
    branches:
      - main
      - release
  workflow_dispatch:

concurrency:
  group: deploy-cloud
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      CLOUD_HOST: ${{ secrets.CLOUD_HOST }}
      CLOUD_USER: ${{ secrets.CLOUD_USER }}
      CLOUD_PORT: ${{ secrets.CLOUD_PORT || '22' }}
      CLOUD_REPO_DIR: ${{ vars.CLOUD_REPO_DIR || '/root/app/SillyTavern' }}
      CLOUD_DEPLOY_DIR: ${{ vars.CLOUD_DEPLOY_DIR || '/opt/sillytavern' }}

    steps:
      - name: Check required secrets
        run: |
          test -n "$CLOUD_HOST"
          test -n "$CLOUD_USER"
          test -n "${{ secrets.CLOUD_SSH_KEY }}"

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.CLOUD_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$CLOUD_PORT" -H "$CLOUD_HOST" >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key -p "$CLOUD_PORT" "$CLOUD_USER@$CLOUD_HOST" \
            "CLOUD_REPO_DIR='$CLOUD_REPO_DIR' CLOUD_DEPLOY_DIR='$CLOUD_DEPLOY_DIR' GITHUB_REF_NAME='$GITHUB_REF_NAME' bash -s" <<'REMOTE'
          set -euo pipefail

          cd "$CLOUD_REPO_DIR"
          git fetch origin "$GITHUB_REF_NAME"
          git checkout -B "$GITHUB_REF_NAME" "origin/$GITHUB_REF_NAME"

          cd "$CLOUD_DEPLOY_DIR"
          docker compose build --pull
          docker compose up -d
          docker compose ps
          REMOTE


